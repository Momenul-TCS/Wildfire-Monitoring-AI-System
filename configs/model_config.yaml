# Model Configuration
# Hyperparameters for all ML models

risk_model:
  name: "Wildfire Risk Prediction Model"
  type: "XGBoostClassifier"
  features:
    - temperature
    - humidity
    - wind_speed
    - wind_direction
    - rainfall
    - pressure
    - drought_index
  target: "wildfire_occurred"
  hyperparameters:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    tree_method: "hist"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

plume_model:
  name: "Smoke Plume Expansion Model"
  type: "XGBoostRegressor"
  features:
    - wind_speed
    - wind_direction
    - humidity
    - temperature
  target: "spread_radius"
  hyperparameters:
    n_estimators: 150
    max_depth: 5
    learning_rate: 0.05
    tree_method: "hist"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
